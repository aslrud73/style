<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1c1a17">
<title>별쫑 화풍 라이브러리</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=IBM+Plex+Sans+KR:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1c1a17; --ink-soft:#4a463f;
    --paper:#f5f2ea; --paper-deep:#ebe6da; --card:#fbfaf6;
    --line:#d9d3c5; --indigo:#2e4a6b; --indigo-soft:#5a7494;
    --indigo-light:#e6ebf2; --accent:#b5532a; --shadow:rgba(40,36,30,.10);
    --danger:#a33a2a; --ok:#3f7a4f;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{font-family:'IBM Plex Sans KR',sans-serif;background:var(--paper);color:var(--ink);line-height:1.6;-webkit-font-smoothing:antialiased}
  body::before{content:"";position:fixed;inset:0;z-index:-1;pointer-events:none;
    background-image:radial-gradient(circle at 20% 30%,rgba(0,0,0,.012) 0 1px,transparent 1px),radial-gradient(circle at 70% 60%,rgba(0,0,0,.012) 0 1px,transparent 1px);
    background-size:7px 7px,11px 11px;}

  /* PIN gate */
  .pin-gate{position:fixed;inset:0;z-index:200;background:var(--paper);display:flex;align-items:center;justify-content:center;flex-direction:column;padding:24px}
  .pin-box{text-align:center;max-width:300px;width:100%}
  .pin-box .lock{width:48px;height:48px;color:var(--indigo);margin-bottom:18px}
  .pin-box h2{font-family:'Gowun Batang',serif;font-size:22px;margin-bottom:6px}
  .pin-box p{color:var(--ink-soft);font-size:13.5px;margin-bottom:24px}
  .pin-input{width:100%;text-align:center;letter-spacing:.5em;font-size:24px;font-family:'JetBrains Mono',monospace;
    padding:14px;border:1.5px solid var(--line);border-radius:11px;background:var(--card);color:var(--ink)}
  .pin-input:focus{outline:none;border-color:var(--indigo);box-shadow:0 0 0 3px var(--indigo-light)}
  .pin-err{color:var(--danger);font-size:13px;margin-top:12px;min-height:18px}
  .pin-input.shake{animation:shake .4s}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}

  header{padding:48px 24px 26px;max-width:1280px;margin:0 auto;border-bottom:1px solid var(--line);position:relative}
  .eyebrow{font-size:12px;letter-spacing:.32em;text-transform:uppercase;color:var(--accent);font-weight:600;margin-bottom:14px}
  h1{font-family:'Gowun Batang',serif;font-weight:700;font-size:clamp(30px,5vw,50px);line-height:1.1;letter-spacing:-.01em}
  h1 .thin{font-weight:400;color:var(--ink-soft)}
  .sub{margin-top:14px;max-width:560px;color:var(--ink-soft);font-size:15px;font-weight:300}
  .count-line{margin-top:18px;font-family:'JetBrains Mono',monospace;font-size:12.5px;color:var(--ink-soft)}
  .count-line b{color:var(--indigo);font-weight:500}
  .add-btn{position:absolute;top:48px;right:24px;display:inline-flex;align-items:center;gap:8px;
    padding:12px 20px;border:none;border-radius:10px;background:var(--ink);color:var(--paper);
    font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;transition:background .15s,transform .1s}
  .add-btn:hover{background:#000}
  .add-btn:active{transform:scale(.97)}
  .add-btn svg{width:17px;height:17px}

  .controls{position:sticky;top:0;z-index:40;background:rgba(245,242,234,.86);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);padding:14px 24px}
  .controls-inner{max-width:1280px;margin:0 auto;display:flex;flex-wrap:wrap;gap:14px;align-items:center}
  .search-wrap{position:relative;flex:1;min-width:200px}
  .search-wrap svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--ink-soft);opacity:.6}
  #search{width:100%;padding:11px 14px 11px 38px;border:1px solid var(--line);border-radius:9px;background:var(--card);color:var(--ink);font-family:inherit;font-size:14px;transition:border-color .15s,box-shadow .15s}
  #search:focus{outline:none;border-color:var(--indigo);box-shadow:0 0 0 3px var(--indigo-light)}
  .filters{display:flex;flex-wrap:wrap;gap:7px}
  .chip{padding:8px 15px;border:1px solid var(--line);border-radius:20px;background:var(--card);color:var(--ink-soft);font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap}
  .chip:hover{border-color:var(--indigo);color:var(--indigo)}
  .chip.active{background:var(--ink);border-color:var(--ink);color:var(--paper)}

  main{max-width:1280px;margin:0 auto;padding:30px 24px 90px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(258px,1fr));gap:22px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden;cursor:pointer;display:flex;flex-direction:column;transition:transform .18s ease,box-shadow .18s ease,border-color .18s;position:relative}
  .card:hover{transform:translateY(-4px);box-shadow:0 14px 30px var(--shadow);border-color:var(--indigo-soft)}
  .thumb{aspect-ratio:4/3;background:var(--paper-deep);position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}
  .thumb img{width:100%;height:100%;object-fit:cover;display:block}
  .thumb .ph{display:flex;flex-direction:column;align-items:center;gap:8px;color:var(--ink-soft);opacity:.5}
  .thumb .ph svg{width:34px;height:34px}
  .thumb .ph span{font-size:11px;letter-spacing:.05em;font-family:'JetBrains Mono',monospace}
  .card-body{padding:15px 16px 17px;display:flex;flex-direction:column;gap:9px;flex:1}
  .cat-tag{align-self:flex-start;font-size:11px;font-weight:600;letter-spacing:.05em;color:var(--indigo);background:var(--indigo-light);padding:3px 9px;border-radius:5px}
  .card h3{font-family:'Gowun Batang',serif;font-weight:700;font-size:16.5px;line-height:1.32}
  .card-tags{margin-top:auto;display:flex;flex-wrap:wrap;gap:5px}
  .mini-tag{font-size:11px;color:var(--ink-soft);font-family:'JetBrains Mono',monospace}
  .mini-tag::before{content:"#"}

  .state{text-align:center;padding:80px 20px;color:var(--ink-soft);grid-column:1/-1}
  .state svg{width:42px;height:42px;opacity:.4;margin-bottom:16px}
  .state p{font-size:15px}
  .state b{color:var(--ink)}
  .spinner{width:34px;height:34px;border:3px solid var(--line);border-top-color:var(--indigo);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* overlay shared */
  .overlay{position:fixed;inset:0;z-index:100;background:rgba(28,26,23,.55);backdrop-filter:blur(4px);display:none;align-items:flex-start;justify-content:center;padding:40px 20px;overflow-y:auto}
  .overlay.open{display:flex}
  .modal{background:var(--card);max-width:880px;width:100%;border-radius:18px;overflow:hidden;box-shadow:0 30px 80px rgba(0,0,0,.3);animation:rise .28s cubic-bezier(.2,.8,.25,1)}
  @keyframes rise{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}
  .modal-img{width:100%;max-height:380px;object-fit:cover;background:var(--paper-deep);display:block}
  .modal-img-ph{width:100%;height:200px;background:var(--paper-deep);display:flex;align-items:center;justify-content:center;color:var(--ink-soft);opacity:.5;flex-direction:column;gap:8px}
  .modal-img-ph svg{width:38px;height:38px}
  .modal-img-ph span{font-size:11px;font-family:'JetBrains Mono',monospace}
  .modal-head{padding:24px 28px 18px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:flex-start;gap:18px}
  .modal-head h2{font-family:'Gowun Batang',serif;font-weight:700;font-size:23px;line-height:1.3}
  .head-actions{display:flex;gap:8px;flex-shrink:0}
  .icon-btn{width:36px;height:36px;border-radius:9px;border:1px solid var(--line);background:var(--paper);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--ink-soft);transition:all .15s}
  .icon-btn:hover{background:var(--ink);color:var(--paper);border-color:var(--ink)}
  .icon-btn.del:hover{background:var(--danger);border-color:var(--danger)}
  .icon-btn svg{width:17px;height:17px}

  .prompt-section{padding:20px 28px 28px}
  .prompt-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
  .prompt-label{font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-soft);font-weight:600}
  .copy-btn{display:inline-flex;align-items:center;gap:7px;padding:9px 17px;border-radius:9px;border:none;cursor:pointer;background:var(--indigo);color:#fff;font-family:inherit;font-size:13.5px;font-weight:600;transition:background .15s,transform .1s}
  .copy-btn:hover{background:#233a55}
  .copy-btn:active{transform:scale(.97)}
  .copy-btn.done{background:var(--ok)}
  .copy-btn svg{width:15px;height:15px}
  .prompt-box{background:var(--paper);border:1px solid var(--line);border-radius:11px;padding:18px 20px;max-height:46vh;overflow-y:auto;font-family:'JetBrains Mono',monospace;font-size:12.5px;line-height:1.75;color:var(--ink-soft);white-space:pre-wrap;word-break:break-word}
  .prompt-box::-webkit-scrollbar{width:9px}
  .prompt-box::-webkit-scrollbar-thumb{background:var(--line);border-radius:5px}

  /* form modal */
  .form-modal{background:var(--card);max-width:680px;width:100%;border-radius:18px;box-shadow:0 30px 80px rgba(0,0,0,.3);animation:rise .28s cubic-bezier(.2,.8,.25,1);max-height:90vh;display:flex;flex-direction:column}
  .form-head{padding:22px 28px 18px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
  .form-head h2{font-family:'Gowun Batang',serif;font-weight:700;font-size:21px}
  .form-body{padding:22px 28px;overflow-y:auto;display:flex;flex-direction:column;gap:16px}
  .field label{display:block;font-size:13px;font-weight:600;color:var(--ink);margin-bottom:7px}
  .field label .req{color:var(--accent)}
  .field input,.field select,.field textarea{width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:9px;background:var(--paper);color:var(--ink);font-family:inherit;font-size:14px;transition:border-color .15s,box-shadow .15s}
  .field textarea{font-family:'JetBrains Mono',monospace;font-size:12.5px;line-height:1.7;resize:vertical;min-height:200px}
  .field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--indigo);box-shadow:0 0 0 3px var(--indigo-light)}
  .field .hint{font-size:11.5px;color:var(--ink-soft);margin-top:5px}
  .img-preview{margin-top:9px;width:100%;max-height:160px;object-fit:cover;border-radius:9px;border:1px solid var(--line);display:none}
  .form-foot{padding:18px 28px;border-top:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;gap:12px}
  .btn{padding:11px 22px;border-radius:9px;border:none;cursor:pointer;font-family:inherit;font-size:14px;font-weight:600;transition:all .15s}
  .btn-primary{background:var(--indigo);color:#fff}
  .btn-primary:hover{background:#233a55}
  .btn-primary:disabled{opacity:.5;cursor:not-allowed}
  .btn-ghost{background:transparent;color:var(--ink-soft);border:1px solid var(--line)}
  .btn-ghost:hover{background:var(--paper-deep)}
  .btn-text-danger{background:transparent;color:var(--danger);font-size:13px;padding:8px 0}
  .btn-text-danger:hover{text-decoration:underline}

  /* toast */
  .toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(80px);z-index:300;background:var(--ink);color:var(--paper);padding:13px 22px;border-radius:11px;font-size:13.5px;font-weight:500;box-shadow:0 12px 30px rgba(0,0,0,.25);opacity:0;transition:transform .3s cubic-bezier(.2,.8,.25,1),opacity .3s;pointer-events:none}
  .toast.show{transform:translateX(-50%) translateY(0);opacity:1}
  .toast.err{background:var(--danger)}

  footer{text-align:center;padding:34px 20px 46px;color:var(--ink-soft);font-size:12px;font-family:'JetBrains Mono',monospace;border-top:1px solid var(--line);max-width:1280px;margin:0 auto}

  @media (max-width:560px){
    header{padding:36px 18px 22px}
    .add-btn{position:static;margin-top:18px;width:100%;justify-content:center}
    .controls{padding:12px 18px}
    main{padding:22px 18px 70px}
    .grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px}
    .modal-head,.form-head,.form-body,.form-foot{padding-left:20px;padding-right:20px}
    .prompt-section{padding:18px 20px 24px}
  }
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>

<!-- PIN GATE -->
<div class="pin-gate" id="pinGate">
  <div class="pin-box">
    <svg class="lock" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="4" y="11" width="16" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>
    <h2>별쫑 화풍 라이브러리</h2>
    <p>PIN 4자리를 입력하세요</p>
    <input class="pin-input" id="pinInput" type="password" inputmode="numeric" maxlength="4" autocomplete="off" placeholder="••••">
    <div class="pin-err" id="pinErr"></div>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none">
  <header>
    <div class="eyebrow">Byeoljjong · Art Style Library</div>
    <h1>별쫑 화풍 <span class="thin">라이브러리</span></h1>
    <p class="sub">예시 이미지와 마스터 프롬프트를 한곳에. 카드를 눌러 전체 프롬프트를 확인하고 복사하세요.</p>
    <div class="count-line">총 <b id="totalCount">0</b>개 화풍 · <b id="shownCount">0</b>개 표시 중</div>
    <button class="add-btn" id="addBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 5v14M5 12h14"/></svg>
      화풍 추가
    </button>
  </header>

  <div class="controls">
    <div class="controls-inner">
      <div class="search-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
        <input id="search" type="text" placeholder="화풍 이름·태그·프롬프트 내용 검색…" autocomplete="off">
      </div>
      <div class="filters" id="filters"></div>
    </div>
  </div>

  <main><div class="grid" id="grid"></div></main>
  <footer>komanara_ai · 화풍 라이브러리 v2 · Firebase 동기화</footer>
</div>

<!-- VIEW MODAL -->
<div class="overlay" id="viewOverlay"><div class="modal" id="viewModal"></div></div>

<!-- FORM MODAL -->
<div class="overlay" id="formOverlay">
  <div class="form-modal">
    <div class="form-head">
      <h2 id="formTitle">화풍 추가</h2>
      <button class="icon-btn" onclick="closeForm()" aria-label="닫기">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="form-body">
      <div class="field">
        <label>화풍 이름 <span class="req">*</span></label>
        <input id="fName" type="text" placeholder="예: 프리미엄 한지 팝업북 / 페이퍼 디오라마">
      </div>
      <div class="field">
        <label>카테고리 <span class="req">*</span></label>
        <select id="fCat"></select>
      </div>
      <div class="field">
        <label>예시 이미지 URL <span class="hint" style="display:inline">(S3 URL · 선택)</span></label>
        <input id="fImage" type="text" placeholder="https://...s3...amazonaws.com/...jpg">
        <img class="img-preview" id="fImgPrev" alt="미리보기">
      </div>
      <div class="field">
        <label>태그 <span class="hint" style="display:inline">(쉼표로 구분 · 선택)</span></label>
        <input id="fTags" type="text" placeholder="한지, 팝업북, 디오라마, 한국전통">
      </div>
      <div class="field">
        <label>마스터 프롬프트 <span class="req">*</span></label>
        <textarea id="fPrompt" placeholder="프롬프트 전체를 붙여넣으세요…"></textarea>
      </div>
    </div>
    <div class="form-foot">
      <button class="btn-text-danger" id="fDelete" style="display:none" onclick="deleteCurrent()">이 화풍 삭제</button>
      <div style="display:flex;gap:12px;margin-left:auto">
        <button class="btn btn-ghost" onclick="closeForm()">취소</button>
        <button class="btn btn-primary" id="fSave" onclick="saveStyle()">저장</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Firebase + App -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, onSnapshot, addDoc, updateDoc, deleteDoc, doc, serverTimestamp, query, orderBy }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* ===== 설정 ===== */
const firebaseConfig = {
  apiKey: "AIzaSyDYkkezyp00Km47HKxnOmHhaQmGC0rvpAE",
  authDomain: "style-libraty.firebaseapp.com",
  projectId: "style-libraty",
  storageBucket: "style-libraty.firebasestorage.app",
  messagingSenderId: "525793776977",
  appId: "1:525793776977:web:ad5331fb039eac52302f70"
};
const APP_PIN = "1234"; // ← 원하는 4자리로 바꾸세요
const CATEGORIES = ["키즈","감성","일상","프리미엄","브랜드","교육","강의","시니어","그래픽","UI"];
const FILTER_CATS = ["전체", ...CATEGORIES];

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const stylesCol = collection(db, "styles");

/* ===== 상태 ===== */
let STYLES = [];
let activeCat = "전체";
let queryStr = "";
let editingId = null;
let loaded = false;

const $ = s=>document.querySelector(s);
const phSVG = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>`;
function esc(s){return (s||"").replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function toast(msg,err){const t=$("#toast");t.textContent=msg;t.className="toast show"+(err?" err":"");setTimeout(()=>t.className="toast",2400);}

/* ===== PIN ===== */
const pinInput=$("#pinInput");
pinInput.addEventListener("input",e=>{
  const v=e.target.value.replace(/\D/g,"");e.target.value=v;
  if(v.length===4){
    if(v===APP_PIN){sessionStorage.setItem("bj_unlocked","1");unlock();}
    else{$("#pinErr").textContent="PIN이 일치하지 않습니다";pinInput.classList.add("shake");setTimeout(()=>{pinInput.classList.remove("shake");pinInput.value="";$("#pinErr").textContent="";},600);}
  }
});
function unlock(){$("#pinGate").style.display="none";$("#app").style.display="block";initApp();}
if(sessionStorage.getItem("bj_unlocked")==="1"){unlock();}else{setTimeout(()=>pinInput.focus(),200);}

/* ===== 앱 init ===== */
function initApp(){
  // 필터 칩
  const fEl=$("#filters");fEl.innerHTML="";
  FILTER_CATS.forEach(cat=>{
    const b=document.createElement("button");
    b.className="chip"+(cat==="전체"?" active":"");b.textContent=cat;
    b.onclick=()=>{activeCat=cat;[...fEl.children].forEach(c=>c.classList.remove("active"));b.classList.add("active");render();};
    fEl.appendChild(b);
  });
  // 카테고리 셀렉트
  const sel=$("#fCat");sel.innerHTML="";
  CATEGORIES.forEach(c=>{const o=document.createElement("option");o.value=c;o.textContent=c;sel.appendChild(o);});
  // 검색
  let t;$("#search").oninput=e=>{clearTimeout(t);t=setTimeout(()=>{queryStr=e.target.value.trim();render();},140);};
  // 추가 버튼
  $("#addBtn").onclick=openAddForm;
  // 이미지 미리보기
  $("#fImage").oninput=e=>{
    const url=e.target.value.trim();const pv=$("#fImgPrev");
    if(url){pv.src=url;pv.style.display="block";pv.onerror=()=>pv.style.display="none";}
    else pv.style.display="none";
  };
  // Firestore 실시간 구독
  showLoading();
  const q=query(stylesCol, orderBy("createdAt","desc"));
  onSnapshot(q, snap=>{
    STYLES=snap.docs.map(d=>({id:d.id,...d.data()}));
    loaded=true;render();
  }, err=>{
    console.error(err);
    $("#grid").innerHTML=`<div class="state">${phSVG}<p><b>데이터를 불러오지 못했습니다.</b><br>인터넷 연결 또는 Firestore 규칙을 확인하세요.</p></div>`;
  });
}

function showLoading(){$("#grid").innerHTML=`<div class="state"><div class="spinner"></div><p>불러오는 중…</p></div>`;}

function matches(s){
  if(activeCat!=="전체" && s.category!==activeCat) return false;
  if(!queryStr) return true;
  const q=queryStr.toLowerCase();
  return (s.name||"").toLowerCase().includes(q)
    || (s.category||"").toLowerCase().includes(q)
    || (s.tags||[]).some(t=>t.toLowerCase().includes(q))
    || (s.prompt||"").toLowerCase().includes(q);
}

function render(){
  const list=STYLES.filter(matches);
  $("#totalCount").textContent=STYLES.length;
  $("#shownCount").textContent=list.length;
  const grid=$("#grid");grid.innerHTML="";
  if(!loaded)return;
  if(STYLES.length===0){
    grid.innerHTML=`<div class="state">${phSVG}<p><b>아직 등록된 화풍이 없습니다.</b><br>오른쪽 위 "화풍 추가"로 첫 화풍을 등록하세요.</p></div>`;return;
  }
  if(list.length===0){
    grid.innerHTML=`<div class="state">${phSVG}<p><b>검색 결과가 없습니다.</b><br>다른 키워드나 카테고리를 시도해 보세요.</p></div>`;return;
  }
  list.forEach(s=>{
    const card=document.createElement("div");card.className="card";
    const thumb=s.image
      ? `<div class="thumb"><img src="${esc(s.image)}" alt="${esc(s.name)}" loading="lazy" onerror="this.parentNode.innerHTML='<div class=\\'ph\\'>${phSVG}<span>이미지 없음</span></div>'"></div>`
      : `<div class="thumb"><div class="ph">${phSVG}<span>NO IMAGE</span></div></div>`;
    const tags=(s.tags||[]).slice(0,4).map(t=>`<span class="mini-tag">${esc(t)}</span>`).join("");
    card.innerHTML=`${thumb}<div class="card-body"><span class="cat-tag">${esc(s.category)}</span><h3>${esc(s.name)}</h3><div class="card-tags">${tags}</div></div>`;
    card.onclick=()=>openView(s);
    grid.appendChild(card);
  });
}

/* ===== 보기 ===== */
function openView(s){
  const img=s.image
    ? `<img class="modal-img" src="${esc(s.image)}" alt="${esc(s.name)}" onerror="this.outerHTML='<div class=\\'modal-img-ph\\'>${phSVG}<span>이미지 없음</span></div>'">`
    : `<div class="modal-img-ph">${phSVG}<span>NO IMAGE</span></div>`;
  $("#viewModal").innerHTML=`
    ${img}
    <div class="modal-head">
      <div><span class="cat-tag" style="margin-bottom:10px">${esc(s.category)}</span><h2>${esc(s.name)}</h2></div>
      <div class="head-actions">
        <button class="icon-btn" id="vEdit" title="수정"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg></button>
        <button class="icon-btn" onclick="closeView()" title="닫기"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
      </div>
    </div>
    <div class="prompt-section">
      <div class="prompt-bar">
        <span class="prompt-label">Master Prompt</span>
        <button class="copy-btn" id="copyBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15V5a2 2 0 0 1 2-2h10"/></svg> 프롬프트 복사</button>
      </div>
      <div class="prompt-box">${esc(s.prompt)}</div>
    </div>`;
  $("#viewOverlay").classList.add("open");document.body.style.overflow="hidden";
  $("#copyBtn").onclick=()=>copyPrompt(s.prompt);
  $("#vEdit").onclick=()=>{closeView();openEditForm(s);};
}
function copyPrompt(text){
  const btn=$("#copyBtn");
  const done=()=>{btn.classList.add("done");btn.innerHTML=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6L9 17l-5-5"/></svg> 복사 완료!`;
    setTimeout(()=>{btn.classList.remove("done");btn.innerHTML=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15V5a2 2 0 0 1 2-2h10"/></svg> 프롬프트 복사`;},1800);};
  if(navigator.clipboard?.writeText)navigator.clipboard.writeText(text).then(done).catch(()=>fb(text,done));else fb(text,done);
}
function fb(text,cb){const ta=document.createElement("textarea");ta.value=text;ta.style.position="fixed";ta.style.opacity="0";document.body.appendChild(ta);ta.select();try{document.execCommand("copy");cb();}catch(e){}document.body.removeChild(ta);}
window.closeView=()=>{$("#viewOverlay").classList.remove("open");document.body.style.overflow="";};
$("#viewOverlay").onclick=e=>{if(e.target===$("#viewOverlay"))closeView();};

/* ===== 폼 ===== */
function fillForm(s){
  $("#fName").value=s?.name||"";
  $("#fCat").value=s?.category||CATEGORIES[0];
  $("#fImage").value=s?.image||"";
  $("#fTags").value=(s?.tags||[]).join(", ");
  $("#fPrompt").value=s?.prompt||"";
  const pv=$("#fImgPrev");
  if(s?.image){pv.src=s.image;pv.style.display="block";}else pv.style.display="none";
}
function openAddForm(){
  editingId=null;$("#formTitle").textContent="화풍 추가";$("#fDelete").style.display="none";
  fillForm(null);$("#formOverlay").classList.add("open");document.body.style.overflow="hidden";
  setTimeout(()=>$("#fName").focus(),100);
}
function openEditForm(s){
  editingId=s.id;$("#formTitle").textContent="화풍 수정";$("#fDelete").style.display="block";
  fillForm(s);$("#formOverlay").classList.add("open");document.body.style.overflow="hidden";
}
window.closeForm=()=>{$("#formOverlay").classList.remove("open");document.body.style.overflow="";};
$("#formOverlay").onclick=e=>{if(e.target===$("#formOverlay"))closeForm();};

window.saveStyle=async function(){
  const name=$("#fName").value.trim();
  const prompt=$("#fPrompt").value.trim();
  if(!name){toast("화풍 이름을 입력하세요",true);$("#fName").focus();return;}
  if(!prompt){toast("프롬프트를 입력하세요",true);$("#fPrompt").focus();return;}
  const data={
    name,
    category:$("#fCat").value,
    image:$("#fImage").value.trim(),
    tags:$("#fTags").value.split(",").map(t=>t.trim()).filter(Boolean),
    prompt
  };
  const btn=$("#fSave");btn.disabled=true;btn.textContent="저장 중…";
  try{
    if(editingId){
      await updateDoc(doc(db,"styles",editingId),data);
      toast("수정되었습니다");
    }else{
      data.createdAt=serverTimestamp();
      await addDoc(stylesCol,data);
      toast("추가되었습니다");
    }
    closeForm();
  }catch(e){
    console.error(e);toast("저장 실패: "+e.message,true);
  }finally{btn.disabled=false;btn.textContent="저장";}
};

window.deleteCurrent=async function(){
  if(!editingId)return;
  if(!confirm("이 화풍을 삭제할까요? 되돌릴 수 없습니다."))return;
  try{await deleteDoc(doc(db,"styles",editingId));toast("삭제되었습니다");closeForm();}
  catch(e){console.error(e);toast("삭제 실패: "+e.message,true);}
};

document.addEventListener("keydown",e=>{if(e.key==="Escape"){closeView();closeForm();}});

// PWA service worker
if("serviceWorker" in navigator){navigator.serviceWorker.register("sw.js").catch(()=>{});}
</script>
</body>
</html>
